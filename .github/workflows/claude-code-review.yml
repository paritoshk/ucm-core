name: Claude Code Review
on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # write needed to post sticky comment
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_sticky_comment: true
          direct_prompt: |
            Review this pull request for the UCM (Unified Context Model) codebase — a probabilistic impact analysis engine.
            Focus on:
            1. Correctness — logic bugs, edge cases, off-by-one errors
            2. Safety — unwrap() calls that could panic, error handling gaps
            3. Performance — unnecessary allocations, clones, or blocking calls
            4. Test coverage — missing tests for new behaviour
            5. API / interface changes — breaking changes to public types or endpoints
            Be concise. Only flag real issues, not style preferences.
            Post a summary comment on the PR with your findings.